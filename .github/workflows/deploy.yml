name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Python sources
        run: python -m compileall scriptorium wsgi.py

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.VPS_APP_DIR || '/srv/scriptorium' }}
          HEALTHCHECK_URL: ${{ secrets.VPS_HEALTHCHECK_URL || 'http://127.0.0.1/healthz' }}
          DEPLOY_HTTPS: ${{ secrets.VPS_DEPLOY_HTTPS || '0' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: APP_DIR,HEALTHCHECK_URL,DEPLOY_HTTPS
          script: |
            cd "${APP_DIR:-/srv/scriptorium}"
            chmod +x deploy/vps/deploy.sh
            ./deploy/vps/deploy.sh "${APP_DIR:-/srv/scriptorium}" "${HEALTHCHECK_URL:-http://127.0.0.1/healthz}"
