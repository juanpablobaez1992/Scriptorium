services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scriptorium-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      APP_HOST: 0.0.0.0
      APP_PORT: "5000"
      PREFERRED_URL_SCHEME: https
      SESSION_COOKIE_SECURE: "1"
      INIT_DB_ON_BOOT: "1"
      STORAGE_PATH: /app/scriptorium/storage
      DATABASE_URL: sqlite:////app/scriptorium/instance/scriptorium.db
    expose:
      - "5000"
    volumes:
      - ./data/storage:/app/scriptorium/storage
      - ./data/instance:/app/scriptorium/instance
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: scriptorium-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/scriptorium.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/healthz"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
