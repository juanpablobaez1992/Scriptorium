{# templates/ideas/edit.html
   Edicion de idea.
   Arquitectura: Views. #}
{% extends "base.html" %}
{% block title %}Editar idea | Scriptorium{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Editar idea #{{ idea.id }}</h1>
<form method="post" action="{{ url_for('ideas.update_idea', id=idea.id) }}">
  <div class="card card-body">
    <div class="mb-2"><label class="form-label">Título</label><input class="form-control" name="title" value="{{ idea.title }}"></div>
    <div class="mb-2"><label class="form-label">Texto original</label><textarea class="form-control" name="text" rows="5">{{ idea.original_text }}</textarea></div>
    <div class="mb-2"><label class="form-label">Texto procesado</label><textarea class="form-control" name="processed_text" rows="3">{{ idea.processed_text or '' }}</textarea></div>
    <div class="mb-2"><label class="form-label">Resumen</label><textarea class="form-control" name="summary" rows="2">{{ idea.summary or '' }}</textarea></div>
    <div class="row g-2">
      <div class="col-md-4"><select class="form-select" name="scope_id"><option value="">Ámbito</option>{% for x in scopes %}<option value="{{x.id}}" {% if idea.scope_id==x.id %}selected{% endif %}>{{x.name}}</option>{% endfor %}</select></div>
      <div class="col-md-4"><select class="form-select" name="project_id"><option value="">Proyecto</option>{% for x in projects %}<option value="{{x.id}}" {% if idea.project_id==x.id %}selected{% endif %}>{{x.name}}</option>{% endfor %}</select></div>
      <div class="col-md-4"><select class="form-select" name="category_id"><option value="">Categoría</option>{% for x in categories %}<option value="{{x.id}}" {% if idea.category_id==x.id %}selected{% endif %}>{{x.name}}</option>{% endfor %}</select></div>
      <div class="col-md-3"><select class="form-select" name="status">{% for x in statuses %}<option {% if idea.status==x %}selected{% endif %}>{{x}}</option>{% endfor %}</select></div>
      <div class="col-md-3"><select class="form-select" name="maturity_level">{% for x in maturities %}<option {% if idea.maturity_level==x %}selected{% endif %}>{{x}}</option>{% endfor %}</select></div>
      <div class="col-md-2"><input class="form-control" type="number" name="priority" min="1" max="5" value="{{ idea.priority }}"></div>
      <div class="col-md-4"><select class="form-select" multiple name="tags">{% for t in tags %}<option value="{{t.id}}" {% if t in idea.tags %}selected{% endif %}>{{ t.name }}</option>{% endfor %}</select></div>
    </div>
    <div class="mt-3"><button class="btn btn-primary">Guardar cambios</button></div>
  </div>
</form>
{% endblock %}
