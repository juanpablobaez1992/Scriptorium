{# templates/taxonomy/scopes.html
   Gestión de ámbitos.
   Arquitectura: Views. #}
{% extends "base.html" %}
{% block title %}Ámbitos | Scriptorium{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Ámbitos</h1>
<div class="row g-3">
  <div class="col-md-4">
    <form class="card card-body" method="post" action="{{ url_for('taxonomy.create_scope') }}">
      <h2 class="h6">Nuevo ámbito</h2>
      <input class="form-control mb-2" name="name" placeholder="Nombre" required>
      <textarea class="form-control mb-2" name="description" placeholder="Descripción"></textarea>
      <input class="form-control mb-2" type="color" name="color" value="#4f46e5">
      <button class="btn btn-primary">Crear</button>
    </form>
  </div>
  <div class="col-md-8">
    <div class="list-group">
      {% for scope in scopes %}
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <div><strong>{{ scope.name }}</strong><div class="small text-muted">{{ scope.description }}</div></div>
        <span class="badge rounded-pill" style="background: {{ scope.color }};">&nbsp;&nbsp;</span>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
